name: spk
fileGroups:
  - README.md
  - scripts
options:
  minimumXcodeGenVersion: 2.45.0
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    exactVersion: 0.17.0
settings:
  base:
    SWIFT_VERSION: 5.10
targets:
  spk:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: spk
        excludes:
          - Resources
      - path: spk/Resources/Assets.xcassets
        buildPhase: resources
      - path: "spk/Resources/AppIcon.icns"
        buildPhase: resources
      - path: "spk/Resources/Models"
        buildPhase: resources
      - path: "spk/Resources/WhisperKitModels"
        type: folder
        buildPhase: resources
      - path: "spk/Resources/Preview Content"
        buildPhase: resources
    info:
      path: spk/Support/Info.plist
      properties:
        CFBundleDisplayName: "$(PRODUCT_NAME)"
        CFBundleIconFile: AppIcon
        LSUIElement: true
        NSMicrophoneUsageDescription: "spk records short dictation clips so it can transcribe your speech locally on this Mac."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.acfinc.spk
        PRODUCT_NAME: spk
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - framework: Vendor/whisper.xcframework
        embed: true
      - package: WhisperKit
        product: WhisperKit
  spkTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: spkTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: spk
schemes:
  spk:
    build:
      targets:
        spk: all
        spkTests:
          - test
    test:
      targets:
        - name: spkTests
